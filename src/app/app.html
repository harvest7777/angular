<nav aria-label="Main navigation">
  @if (isLoading()) {
    <span aria-live="polite">Loading...</span>
  } @else if (isAuthenticated()) {
    <button type="button" (click)="logout()">Log out</button>
  } @else {
    <button type="button" (click)="login()">Log in</button>
  }
</nav>
<main class="main">
  <div class="content">
    <router-outlet />
  </div>
</main>
